<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLT - Login </title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Times New Roman", Times, serif;
            font-style: normal !important;
        }

        body {
            background: #ffd7e7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: #ffffff;
            border: 8px solid #f7a8c7;
            border-radius: 18px;
            padding: 60px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        /* Nút quay lại */
        .back-home {
            position: absolute;
            top: 25px;
            left: 30px;
            text-decoration: none;
            color: #ff4f93;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-home:hover {
            color: #ff2f7d;
            transform: translateX(-5px);
        }

        /* Tiêu đề */
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .top p { 
            color: #ff4f93; 
            font-size: 28px; 
            text-transform: capitalize;
        }

        .top h1 { 
            color: #ff4f93; 
            font-size: 50px; 
            letter-spacing: 2px;
        }

        /* Form nhập liệu */
        .form-group { 
            margin-bottom: 30px; 
        }

        .form-group label { 
            display: block; 
            margin-bottom: 10px; 
            color: #ff4f93; 
            font-size: 22px; 
        }

        .form-group input { 
            width: 100%; 
            padding: 15px 20px; 
            border: 2px solid #ff9cc4; 
            border-radius: 12px; 
            outline: none; 
            font-size: 18px; 
            background: #fff;
            transition: 0.3s;
        }

        .form-group input:focus { 
            border-color: #ff4f93; 
            box-shadow: 0 0 8px rgba(255, 79, 147, 0.2);
        }

        .option { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 40px;
            gap: 20px;
        }

        .login-box, .forgot { 
            flex: 1;
            text-align: center; 
        }

        .login-box a, .forgot a { 
            text-decoration: none; 
            color: #ff4f93; 
            font-size: 26px; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .login-box a:hover, .forgot a:hover {
            color: #ff2f7d;
            text-shadow: 0 0 5px rgba(255, 47, 125, 0.2);
        }

        .login-box p, .forgot p { 
            margin-top: 10px; 
            color: #888; 
            font-size: 15px; 
        }

        @media (max-width: 600px) {
            .container { padding: 40px 20px; }
            .top h1 { font-size: 35px; }
            .option { flex-direction: column; gap: 30px; }
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="register.html" class="back-home">
            <ion-icon name="arrow-back-outline"></ion-icon> Quay lại
        </a>

        <div class="top">
            <p>Sign up / Login</p>
            <h1>LLT</h1>
        </div>

        <form action="#">
            <div class="form-group">
                <label for="user">Username or email</label>
                <input type="text" id="user" placeholder="Enter username or email" required>
            </div>

            <div class="form-group">
                <label for="pass">Password</label>
                <input type="password" id="pass" placeholder="Enter password" required>
            </div>

            <div class="option">
                <div class="login-box">
                    <a onclick="thongbao()">Login</a>
                    <p>Sign in to continue shopping</p>
                </div>

                <div class="forgot">
                    <a href="forgot.html">Forgot password?</a>
                    <p>Reset your password here</p>
                </div>
            </div>
        </form>
    </div>

    <script>
        function thongbao(){
            const user = document.getElementById('user').value;
            if(user === "") {
                alert("Vui lòng nhập thông tin!");
            } else {
                alert("Đăng nhập thành công! Chào mừng " + user);
            }
        }
    </script>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
